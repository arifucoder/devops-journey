<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" width="960" height="660" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Noto Sans Bengali, Nirmala UI, sans-serif">
  <rect width="960" height="660" fill="#0B1020"/>

  <text x="32" y="38" fill="#8B97B0" font-size="12" letter-spacing="2.5">04 &#160;/&#160; OSI MODEL — OPEN SYSTEMS INTERCONNECTION</text>
  <line x1="32" y1="52" x2="928" y2="52" stroke="#253049" stroke-width="1"/>
  <text x="32" y="80" fill="#E6EAF3" font-size="17" font-weight="600">Seven layers, each with one job</text>

  <text x="106" y="106" fill="#8B97B0" font-size="10.5" letter-spacing="1.6">LAYER</text>
  <text x="330" y="106" fill="#8B97B0" font-size="10.5" letter-spacing="1.6">WHAT IT DOES</text>
  <text x="600" y="106" fill="#8B97B0" font-size="10.5" letter-spacing="1.6">EXAMPLES</text>
  <text x="792" y="106" fill="#8B97B0" font-size="10.5" letter-spacing="1.6">LIKE&#8230;</text>

  <!-- L7 -->
  <rect x="60" y="116" width="836" height="62" rx="8" fill="#151B2E" stroke="#2E3B57"/>
  <rect x="60" y="116" width="4" height="62" rx="2" fill="#FB7185"/>
  <text x="86" y="153" fill="#FB7185" font-size="22" font-weight="700" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">7</text>
  <text x="116" y="142" fill="#E6EAF3" font-size="15" font-weight="600">Application</text>
  <text x="116" y="163" fill="#8B97B0" font-size="11.5">the app you touch</text>
  <text x="330" y="152" fill="#B7C0D4" font-size="13">Talks to the user, hands over the message</text>
  <text x="600" y="152" fill="#FB7185" font-size="12" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">HTTP · DNS · SMTP · FTP</text>
  <text x="792" y="152" fill="#8B97B0" font-size="12.5">Restaurant counter</text>

  <!-- L6 -->
  <rect x="60" y="184" width="836" height="62" rx="8" fill="#151B2E" stroke="#2E3B57"/>
  <rect x="60" y="184" width="4" height="62" rx="2" fill="#F472B6"/>
  <text x="86" y="221" fill="#F472B6" font-size="22" font-weight="700" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">6</text>
  <text x="116" y="210" fill="#E6EAF3" font-size="15" font-weight="600">Presentation</text>
  <text x="116" y="231" fill="#8B97B0" font-size="11.5">format &amp; encrypt</text>
  <text x="330" y="220" fill="#B7C0D4" font-size="13">Encoding, compression, encryption</text>
  <text x="600" y="220" fill="#F472B6" font-size="12" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">SSL/TLS · JPEG · HTML</text>
  <text x="792" y="220" fill="#8B97B0" font-size="12.5">A translator</text>

  <!-- L5 -->
  <rect x="60" y="252" width="836" height="62" rx="8" fill="#151B2E" stroke="#2E3B57"/>
  <rect x="60" y="252" width="4" height="62" rx="2" fill="#A78BFA"/>
  <text x="86" y="289" fill="#A78BFA" font-size="22" font-weight="700" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">5</text>
  <text x="116" y="278" fill="#E6EAF3" font-size="15" font-weight="600">Session</text>
  <text x="116" y="299" fill="#8B97B0" font-size="11.5">open, hold, close</text>
  <text x="330" y="288" fill="#B7C0D4" font-size="13">Starts the conversation and ends it cleanly</text>
  <text x="600" y="288" fill="#A78BFA" font-size="12" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">RPC · SIP · Sockets</text>
  <text x="792" y="288" fill="#8B97B0" font-size="12.5">A phone call</text>

  <!-- L4 -->
  <rect x="60" y="320" width="836" height="62" rx="8" fill="#0E2733" stroke="#22D3EE" stroke-width="1.8"/>
  <rect x="60" y="320" width="4" height="62" rx="2" fill="#22D3EE"/>
  <text x="86" y="357" fill="#22D3EE" font-size="22" font-weight="700" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">4</text>
  <text x="116" y="346" fill="#E6EAF3" font-size="15" font-weight="600">Transport</text>
  <text x="116" y="367" fill="#67E8F9" font-size="11.5">heart of OSI</text>
  <text x="330" y="346" fill="#B7C0D4" font-size="13">Splits data into pieces, numbers them,</text>
  <text x="330" y="365" fill="#B7C0D4" font-size="13">reassembles them — and picks the <tspan fill="#67E8F9">port</tspan></text>
  <text x="600" y="356" fill="#22D3EE" font-size="12" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">TCP · UDP</text>
  <text x="792" y="356" fill="#8B97B0" font-size="12.5">Courier service</text>

  <!-- L3 -->
  <rect x="60" y="388" width="836" height="62" rx="8" fill="#151B2E" stroke="#2E3B57"/>
  <rect x="60" y="388" width="4" height="62" rx="2" fill="#34D399"/>
  <text x="86" y="425" fill="#34D399" font-size="22" font-weight="700" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">3</text>
  <text x="116" y="414" fill="#E6EAF3" font-size="15" font-weight="600">Network</text>
  <text x="116" y="435" fill="#34D399" font-size="11.5">IP lives here</text>
  <text x="330" y="424" fill="#B7C0D4" font-size="13">Picks the route across networks using IP</text>
  <text x="600" y="424" fill="#34D399" font-size="12" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">IP · ICMP · OSPF</text>
  <text x="792" y="424" fill="#8B97B0" font-size="12.5">Postal routing</text>

  <!-- L2 -->
  <rect x="60" y="456" width="836" height="62" rx="8" fill="#151B2E" stroke="#2E3B57"/>
  <rect x="60" y="456" width="4" height="62" rx="2" fill="#FBBF24"/>
  <text x="86" y="493" fill="#FBBF24" font-size="22" font-weight="700" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">2</text>
  <text x="116" y="482" fill="#E6EAF3" font-size="15" font-weight="600">Data Link</text>
  <text x="116" y="503" fill="#FBBF24" font-size="11.5">MAC lives here</text>
  <text x="330" y="492" fill="#B7C0D4" font-size="13">Delivers to the next machine, spots errors</text>
  <text x="600" y="492" fill="#FBBF24" font-size="12" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">Ethernet · ARP · WiFi</text>
  <text x="792" y="492" fill="#8B97B0" font-size="12.5">Number plates</text>

  <!-- L1 -->
  <rect x="60" y="524" width="836" height="62" rx="8" fill="#151B2E" stroke="#2E3B57"/>
  <rect x="60" y="524" width="4" height="62" rx="2" fill="#64748B"/>
  <text x="86" y="561" fill="#94A3B8" font-size="22" font-weight="700" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">1</text>
  <text x="116" y="550" fill="#E6EAF3" font-size="15" font-weight="600">Physical</text>
  <text x="116" y="571" fill="#8B97B0" font-size="11.5">the raw wire</text>
  <text x="330" y="560" fill="#B7C0D4" font-size="13">Sends the actual 0s and 1s down the medium</text>
  <text x="600" y="560" fill="#94A3B8" font-size="12" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">Cable · Fiber · Radio</text>
  <text x="792" y="560" fill="#8B97B0" font-size="12.5">Roads</text>

  <!-- side brackets -->
  <path d="M50 116 L38 116 L38 314 L50 314" fill="none" stroke="#8B97B0" stroke-width="1.2"/>
  <text x="30" y="222" fill="#8B97B0" font-size="11.5" letter-spacing="1.4" text-anchor="middle" transform="rotate(-90 30 222)">SOFTWARE</text>
  <path d="M50 456 L38 456 L38 586 L50 586" fill="none" stroke="#8B97B0" stroke-width="1.2"/>
  <text x="30" y="521" fill="#8B97B0" font-size="11.5" letter-spacing="1.4" text-anchor="middle" transform="rotate(-90 30 521)">HARDWARE</text>

  <!-- mnemonic -->
  <text x="60" y="622" fill="#8B97B0" font-size="12.5">নিচ থেকে উপরে মনে রাখার কৌশল &#8594;</text>
  <text x="292" y="622" fill="#E6EAF3" font-size="12.5" font-weight="600"><tspan fill="#64748B">P</tspan>lease <tspan fill="#FBBF24">D</tspan>o <tspan fill="#34D399">N</tspan>ot <tspan fill="#22D3EE">T</tspan>hrow <tspan fill="#A78BFA">S</tspan>ausage <tspan fill="#F472B6">P</tspan>izza <tspan fill="#FB7185">A</tspan>way</text>
</svg>
